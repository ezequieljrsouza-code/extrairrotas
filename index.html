<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extrator de IDs de Rotas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface-2: #f0efea;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text-2: #5f5e5a;
      --text-3: #888780;
      --info-bg: #e6f1fb;
      --info-text: #185fa5;
      --success-bg: #eaf3de;
      --success-text: #3b6d11;
      --warn-bg: #faeeda;
      --warn-text: #854f0b;
      --danger-text: #a32d2d;
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --surface: #2a2a28;
        --surface-2: #232321;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --text: #f0efe9;
        --text-2: #b4b2a9;
        --text-3: #888780;
        --info-bg: #0c447c22;
        --info-text: #85b7eb;
        --success-bg: #27500a22;
        --success-text: #97c459;
        --warn-bg: #63380622;
        --warn-text: #ef9f27;
        --danger-text: #f09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 1.5rem;
    }

    #drop-zone {
      border: 1.5px dashed var(--border-md);
      border-radius: var(--radius-lg);
      background: var(--surface-2);
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      outline: none;
    }

    #drop-zone.highlight {
      border-color: var(--info-text);
      background: var(--info-bg);
    }

    #drop-zone i { font-size: 36px; color: var(--text-3); }
    #drop-zone .title { font-size: 15px; font-weight: 500; }
    #drop-zone .hint { font-size: 13px; color: var(--text-2); }

    #preview-img {
      max-width: 100%;
      max-height: 120px;
      border-radius: var(--radius);
      margin-top: 8px;
      display: none;
    }

    #status-msg {
      font-size: 13px;
      color: var(--text-2);
      margin: 8px 0 0;
      min-height: 18px;
      text-align: center;
    }

    #summary {
      display: none;
      gap: 12px;
      margin: 1rem 0;
    }

    .stat-card {
      flex: 1;
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 12px 16px;
      text-align: center;
    }

    .stat-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }

    #route-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 0;
      padding: 0;
    }

    .route-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 14px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    .route-id {
      font-weight: 500;
      font-family: 'Courier New', monospace;
    }

    .route-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--info-bg);
      color: var(--info-text);
      font-weight: 500;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0 0 0 8px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--danger-text); }

    button.action-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 9px 16px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    button.action-btn:hover { background: var(--surface-2); }

    button.action-btn.secondary {
      color: var(--text-2);
      font-size: 13px;
    }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--surface);
      padding: 8px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #actions { display: none; }


  </style>
</head>
<body>
  <div class="container">
    <h1>Extrator de IDs de Rotas</h1>
    <p class="subtitle">Cole imagens para extrair os IDs</code></p>

    <div id="drop-zone" tabindex="0" role="button" aria-label="Cole ou arraste uma imagem aqui">
      <i class="ti ti-clipboard-text" aria-hidden="true"></i>
      <p class="title">Cole uma imagem aqui</p>
      <p class="hint">Ctrl+V · Cmd+V · ou arraste a imagem</p>
      <img id="preview-img" alt="Prévia da imagem colada" />
    </div>

    <p id="status-msg"></p>

    <div id="summary" style="display:none; flex-direction: row;">
      <div class="stat-card">
        <div class="stat-label">IDs extraídos (total)</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Imagens processadas</div>
        <div class="stat-value" id="img-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Duplicatas ignoradas</div>
        <div class="stat-value" id="dup-count">0</div>
      </div>
    </div>

    <ul id="route-list"></ul>

    <div id="actions">
      <button class="action-btn" onclick="copyAll()">
        <i class="ti ti-copy" aria-hidden="true"></i> Copiar todos os IDs
      </button>
      <button class="action-btn secondary" onclick="clearAll()">
        <i class="ti ti-trash" aria-hidden="true"></i> Limpar lista
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const routes = [];
    let imgCount = 0;
    let dupCount = 0;

    const dropZone   = document.getElementById('drop-zone');
    const routeList  = document.getElementById('route-list');
    const totalCount = document.getElementById('total-count');
    const imgCountEl = document.getElementById('img-count');
    const dupCountEl = document.getElementById('dup-count');
    const summary    = document.getElementById('summary');
    const actions    = document.getElementById('actions');
    const statusMsg  = document.getElementById('status-msg');
    const previewImg = document.getElementById('preview-img');

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function setStatus(msg, color) {
      statusMsg.textContent = msg;
      statusMsg.style.color = color || 'var(--text-2)';
    }

    function updateStats() {
      totalCount.textContent = routes.length;
      imgCountEl.textContent = imgCount;
      dupCountEl.textContent = dupCount;
      const show = routes.length > 0;
      summary.style.display = show ? 'flex' : 'none';
      actions.style.display = show ? 'block' : 'none';
    }

    function addRoutes(ids, imgNum) {
      let added = 0;
      ids.forEach(id => {
        if (!routes.includes(id)) {
          routes.push(id);
          const li = document.createElement('li');
          li.className = 'route-item';
          li.id = 'route-' + id;
          li.innerHTML = `
            <span class="route-id">${id},</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="route-badge">Imagem ${imgNum}</span>
              <button class="remove-btn" onclick="removeRoute('${id}')" title="Remover">
                <i class="ti ti-x" aria-hidden="true"></i>
              </button>
            </div>`;
          routeList.appendChild(li);
          added++;
        } else {
          dupCount++;
        }
      });
      return added;
    }

    function removeRoute(id) {
      const idx = routes.indexOf(id);
      if (idx > -1) routes.splice(idx, 1);
      const el = document.getElementById('route-' + id);
      if (el) el.remove();
      updateStats();
    }

    function clearAll() {
      routes.length = 0;
      imgCount = 0;
      dupCount = 0;
      routeList.innerHTML = '';
      previewImg.style.display = 'none';
      previewImg.src = '';
      updateStats();
      setStatus('');
    }

    function copyAll() {
      const text = routes.map(id => id + ',').join('\n');
      navigator.clipboard.writeText(text).then(() => showToast('IDs copiados para a área de transferência!'));
    }

    // Pré-processa imagem: escala 3x + binarização para melhorar OCR
    function preprocessImage(imgUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const scale = 3;
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');

          // Fundo branco
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Desenha escalado
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          // Binarização (preto/branco) com threshold alto
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const d = imageData.data;
          for (let i = 0; i < d.length; i += 4) {
            const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
            const bw = gray < 140 ? 0 : 255;
            d[i] = d[i+1] = d[i+2] = bw;
          }
          ctx.putImageData(imageData, 0, 0);

          resolve(canvas.toDataURL('image/png'));
        };
        img.src = imgUrl;
      });
    }

    // Worker Tesseract v5 reutilizável
    let tWorker = null;
    async function getWorker() {
      if (!tWorker) {
        tWorker = await Tesseract.createWorker('eng', 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              setStatus(`OCR: ${Math.round(m.progress * 100)}%`, 'var(--info-text)');
            }
          }
        });
        await tWorker.setParameters({
          preserve_interword_spaces: '1',
        });
      }
      return tWorker;
    }

    // Extrai IDs de um texto OCR
    function extractIds(text) {
      const all = [];

      // 1) Após # ou variantes (mesma linha)
      const r1 = text.match(/[#＃№][\s]*(\d{7,10})/g) || [];
      r1.forEach(m => all.push(m.replace(/[^0-9]/g, '')));

      // 2) Normalizado (sem quebras) — pega # + número em linhas separadas
      const norm = text.replace(/[\r\n]+/g, ' ');
      const r2 = norm.match(/[#＃№][\s]*(\d{7,10})/g) || [];
      r2.forEach(m => all.push(m.replace(/[^0-9]/g, '')));

      // 3) Padrão numérico puro: 9 dígitos começando com 37/38
      const r3 = text.match(/\b3[78]\d{7}\b/g) || [];
      r3.forEach(m => all.push(m));

      // 4) Padrão com possível prefixo sujo (OCR lendo # como 4, H, etc)
      const r4 = norm.match(/[^0-9](3[78]\d{7})(?=[^0-9]|$)/g) || [];
      r4.forEach(m => { const d = m.replace(/[^0-9]/g, '').match(/3[78]\d{7}/); if (d) all.push(d[0]); });

      return [...new Set(all.filter(id => id.length === 9))];
    }

    async function processImage(file) {
      setStatus('Pré-processando imagem…', 'var(--info-text)');
      dropZone.classList.add('highlight');

      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewImg.style.display = 'block';

      try {
        // Pré-processar: escalar + binarizar
        const processedUrl = await preprocessImage(url);

        const worker = await getWorker();
        const { data } = await worker.recognize(processedUrl);
        const text = data.text;
        console.log('=== OCR bruto ===\n', text);

        const ids = extractIds(text);

        imgCount++;
        const added = addRoutes(ids, imgCount);
        updateStats();

        if (ids.length === 0) {
          setStatus('Nenhum ID encontrado. Verifique o console (F12) para diagnóstico.', 'var(--warn-text)');
        } else {
          setStatus(`✓ ${added} novo(s) ID(s) adicionado(s) | ${ids.length - added} duplicata(s) ignorada(s).`, 'var(--success-text)');
        }
      } catch (e) {
        setStatus('Erro ao processar a imagem. Tente novamente.', 'var(--danger-text)');
        console.error(e);
      }

      dropZone.classList.remove('highlight');
      URL.revokeObjectURL(url);
    }

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) processImage(file);
          break;
        }
      }
    });

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('highlight'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('highlight'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('highlight');
      const file = e.dataTransfer?.files[0];
      if (file && file.type.startsWith('image/')) processImage(file);
    });

    dropZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') dropZone.focus();
    });
  </script>
</body>
</html>
